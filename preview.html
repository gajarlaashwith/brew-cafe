  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>

  <!-- Babel Standalone for compiling JSX in browser -->

  <!-- Tailwind Custom Configuration -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            coffee: {
              50: '#fdfbf7',
              100: '#f8f3ed',
              200: '#ebdecb',
              300: '#d5be9b',
              400: '#b8966c',
              500: '#9d744a',
              600: '#845c38',
              700: '#69462a',
              800: '#4d321f',
              900: '#2d1f1a',
            }

  <style type="text/css">
    /* Global Base styles */
    html {
      scroll-behavior: smooth;
    }
    
    body {
      font-family: 'Outfit', sans-serif;
      transition: background-color 0.5s, color 0.5s;
    }
    
    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 10px;
    }
    ::-webkit-scrollbar-track {
      background: #f8f3ed;
    }
    .dark ::-webkit-scrollbar-track {
      background: #120d0b;
    }
    ::-webkit-scrollbar-thumb {
      background: #b8966c;
      border-radius: 9999px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #9d744a;
    }
    .dark ::-webkit-scrollbar-thumb {
      background: #69462a;
    }
    .dark ::-webkit-scrollbar-thumb:hover {
      background: #845c38;
    }

    /* Glass Navbar Glassmorphism */
    .glass-nav {
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    /* Native Buttery-Smooth Intersection Observer Scroll Reveals */
    .reveal-item {
      opacity: 0;
      transform: translateY(35px);
      transition: all 0.9s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .reveal-item.revealed {
      opacity: 1;
      transform: translateY(0);
    }

    /* Drip loading animation keyframes */
    @keyframes drip {
      0%, 100% { transform: translateY(0) scaleY(1); }
      50% { transform: translateY(8px) scaleY(0.9); }
    }
    .animate-drip {
      animation: drip 2s ease-in-out infinite;
    }
  </style>
</head>

    // Shared State Contexts
    const ThemeContext = createContext();
    const useTheme = () => useContext(ThemeContext);

    // Theme Provider implementation
    const ThemeProvider = ({ children }) => {
      const [isDarkMode, setIsDarkMode] = useState(() => {
        const saved = localStorage.getItem('theme');
        if (saved) return saved === 'dark';
        return window.matchMedia('(prefers-color-scheme: dark)').matches;
      });

      useEffect(() => {
        const root = window.document.documentElement;
        const body = window.document.body;
        if (isDarkMode) {
          root.classList.add('dark');
          body.classList.add('dark');
          localStorage.setItem('theme', 'dark');
        } else {
          root.classList.remove('dark');
          body.classList.remove('dark');
          localStorage.setItem('theme', 'light');
        }
      }, [isDarkMode]);

      const toggleTheme = () => setIsDarkMode(prev => !prev);

      return (
        <ThemeContext.Provider value={{ isDarkMode, toggleTheme }}>
          {children}
        </ThemeContext.Provider>
      );
    };

    // Navbar Component
    const Navbar = () => {
      const { isDarkMode, toggleTheme } = useTheme();
      const [isOpen, setIsOpen] = useState(false);
      const [isScrolled, setIsScrolled] = useState(false);

      useEffect(() => {
        const handleScroll = () => {
          setIsScrolled(window.scrollY > 50);
        };
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      const navLinks = [
        { name: 'Home', href: '#home' },
        { name: 'About', href: '#about' },
        { name: 'Menu', href: '#menu' },
        { name: 'Gallery', href: '#gallery' },
        { name: 'Reviews', href: '#reviews' },
        { name: 'Contact', href: '#contact' },
      ];

      return (
        <nav className={`fixed w-full z-40 transition-all duration-300 ${
          isScrolled 
            ? 'glass-nav py-4 shadow-lg bg-coffee-100/70 dark:bg-[#0c0806]/70 border-b border-coffee-200/20 dark:border-coffee-900/30' 
            : 'bg-transparent py-6'
        }`}>
          <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
            {/* Logo */}
            <a href="#home" className="flex items-center gap-2 group">
              <div className="w-10 h-10 rounded-full bg-coffee-500 flex items-center justify-center text-white transition-transform group-hover:rotate-12">
                <Icons.Coffee size={20} />
              </div>
              <span className="text-xl font-bold tracking-wider font-serif text-coffee-800 dark:text-coffee-100 group-hover:text-coffee-500 dark:group-hover:text-coffee-400 transition-colors">
                BREW HAVEN
              </span>
            </a>

            {/* Desktop Navigation */}
            <div className="hidden md:flex items-center gap-8">
              {navLinks.map((link) => (
                <a
                  key={link.name}
                  href={link.href}
                  className="text-sm font-medium tracking-wide text-coffee-800 dark:text-coffee-200 hover:text-coffee-500 dark:hover:text-coffee-400 transition-colors relative after:content-[''] after:absolute after:bottom-[-4px] after:left-0 after:w-0 after:h-[2px] after:bg-coffee-500 after:transition-all hover:after:w-full"
                >
                  {link.name}
                </a>
              ))}
              
              {/* Theme Toggle Button */}
              <button
                onClick={toggleTheme}
                className="p-2 rounded-full hover:bg-coffee-200/50 dark:hover:bg-coffee-900/40 text-coffee-800 dark:text-coffee-200 transition-colors"
                aria-label="Toggle Theme"
              >
                {isDarkMode ? <Icons.Sun size={20} /> : <Icons.Moon size={20} />}
              </button>

              {/* Book Table Button */}
              <a
                href="#contact"
                className="px-5 py-2.5 rounded-full text-xs font-semibold uppercase tracking-wider bg-coffee-600 hover:bg-coffee-700 text-white dark:bg-coffee-500 dark:hover:bg-coffee-600 shadow-md transition-all duration-300 hover:scale-105"
              >
                Book Table
              </a>
            </div>

            {/* Mobile buttons */}
            <div className="flex md:hidden items-center gap-4">
              <button
                onClick={toggleTheme}
                className="p-2 rounded-full hover:bg-coffee-200/50 dark:hover:bg-coffee-900/40 text-coffee-800 dark:text-coffee-200 transition-colors"
              >
                {isDarkMode ? <Icons.Sun size={20} /> : <Icons.Moon size={20} />}
              </button>
              
              <button
                onClick={() => setIsOpen(!isOpen)}
                className="text-coffee-800 dark:text-coffee-200 p-1 focus:outline-none"
              >
                {isOpen ? <Icons.X size={24} /> : <Icons.Menu size={24} />}
              </button>
            </div>
          </div>

          {/* Mobile Drawer */}
          <div className={`md:hidden fixed top-[72px] right-0 w-3/4 max-w-sm h-[calc(100vh-72px)] bg-coffee-100 dark:bg-[#0e0a08] shadow-2xl p-8 transform transition-transform duration-300 ease-in-out border-l border-coffee-200/20 dark:border-coffee-900/30 ${
            isOpen ? 'translate-x-0' : 'translate-x-full'
          }`}>
            <div className="flex flex-col gap-6">
              {navLinks.map((link) => (
                <a
                  key={link.name}
                  href={link.href}
                  onClick={() => setIsOpen(false)}
                  className="text-lg font-medium text-coffee-800 dark:text-coffee-200 hover:text-coffee-500 dark:hover:text-coffee-400 transition-colors"
                >
                  {link.name}
                </a>
              ))}
              
              <a
                href="#contact"
                onClick={() => setIsOpen(false)}
                className="mt-4 px-6 py-3 rounded-full text-center text-sm font-semibold uppercase tracking-wider bg-coffee-600 dark:bg-coffee-500 text-white shadow-md"
              >
                Book Table
              </a>
            </div>
          </div>
        </nav>
      );
    };

    // Hero Component
    const Hero = () => {
      return (
        <section 
          id="home"
          className="relative h-screen flex items-center justify-center bg-cover bg-center overflow-hidden"
          style={{
            backgroundImage: "url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=1600&auto=format&fit=crop')"

        >
          {/* Dark Overlay */}
          <div className="absolute inset-0 bg-gradient-to-b from-black/60 via-black/50 to-coffee-900/40 dark:to-[#0c0806]"></div>

          <div className="relative z-10 text-center px-6 max-w-4xl mx-auto space-y-6">
            <div className="flex items-center justify-center gap-3 animate-[pulse_3s_infinite]">
              <span className="h-[1px] w-8 bg-coffee-400"></span>
              <span className="text-xs md:text-sm font-semibold uppercase tracking-widest text-coffee-300">
                Est. 2024 • Specialty Coffee Roasters
              </span>
              <span className="h-[1px] w-8 bg-coffee-400"></span>
            </div>

            <h1 className="text-4xl sm:text-6xl md:text-8xl font-serif font-semibold text-white tracking-wide leading-tight">
              Sip the Warmth of <br />
              <span className="text-coffee-300 italic font-normal">Brew Haven</span>
            </h1>
            
            <p className="text-sm sm:text-base md:text-xl text-gray-200 font-light max-w-2xl mx-auto leading-relaxed">
              Step into a cozy urban sanctuary. Experience artisanal, locally sourced beans meticulously handcrafted by expert baristas.
            </p>

            <div className="flex flex-col sm:flex-row justify-center items-center gap-4 pt-4">
              <a
                href="#menu"
                className="group w-full sm:w-auto flex items-center justify-center gap-2 bg-coffee-500 hover:bg-coffee-600 text-white px-8 py-4 rounded-full text-xs font-semibold tracking-wider uppercase transition-all duration-300 shadow-xl hover:scale-105"

        { icon: <Icons.Twitter size={16} />, href: "https://twitter.com" },
        { icon: <Icons.Youtube size={16} />, href: "https://youtube.com" }
      ];

      const quickLinks = [
        { name: "Home", href: "#home" },
        { name: "About Story", href: "#about" },
        { name: "Artisanal Menu", href: "#menu" },
        { name: "Visual Gallery", href: "#gallery" },
        { name: "Guest Reviews", href: "#reviews" },
        { name: "Table Booking", href: "#contact" }

      const scrollToTop = () => {

        <footer className="bg-coffee-900 text-coffee-100 dark:bg-[#080504] border-t border-coffee-950 dark:border-coffee-950/20 transition-colors duration-500 pt-16 pb-8 relative overflow-hidden">
          <div className="absolute left-1/2 bottom-0 -translate-x-1/2 w-full max-w-4xl h-[1px] bg-gradient-to-r from-transparent via-coffee-500/20 to-transparent"></div>

          <div className="max-w-7xl mx-auto px-6">
            
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-12 mb-16">
              
              {/* Brand Col */}

                {/* Social icons */}

                  {socialLinks.map((social, idx) => (
                    <a

                      className="w-10 h-10 rounded-full bg-coffee-800/60 dark:bg-coffee-900/60 hover:bg-coffee-500 dark:hover:bg-coffee-500 flex items-center justify-center text-coffee-300 hover:text-white transition-all duration-300 hover:scale-105"

                      {social.icon}

                  ))}

              {/* Links Col */}

                <h4 className="font-serif font-bold text-base text-white tracking-wide">
                  Quick Explore
                </h4>
                <ul className="grid grid-cols-2 gap-y-3 gap-x-4 text-xs font-light text-coffee-400">
                  {quickLinks.map((link) => (
                    <li key={link.name}>

                <form onSubmit={(e) => { e.preventDefault(); alert("Subscribed successfully!"); }} className="flex gap-2">

              >
                <Icons.ArrowUp size={16} />
              </button>
            </div>

          </div>
        </footer>
      );
    };

    // Main App Coordinator Component
    const App = () => {
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        // loading state timer (2s)
        const timer = setTimeout(() => {
          setLoading(false);
        }, 2000);
        return () => clearTimeout(timer);
      }, []);

      // Register native Intersection Observer for premium buttery scroll-reveals
      useEffect(() => {
        if (loading) return;
        
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add('revealed');
            }
          });
        }, {
          threshold: 0.1,
          rootMargin: "0px 0px -50px 0px"
        });

        // Query and observe items
        const items = document.querySelectorAll('.reveal-item');
        items.forEach(item => observer.observe(item));

        return () => observer.disconnect();
      }, [loading]);

      if (loading) {
        return (
          <div className="fixed inset-0 z-50 flex flex-col items-center justify-center bg-[#0c0806] text-coffee-100">
            <div className="relative flex flex-col items-center">
              {/* Cozy Coffee Cup Loader */}
              <div className="relative w-20 h-24 border-4 border-coffee-200 rounded-b-3xl border-t-0 flex items-end overflow-hidden mb-4">

                {/* Steam rises */}

              </div>
              
              <h1 className="text-2xl font-serif tracking-widest uppercase animate-pulse text-coffee-300">
                Brew Haven
              </h1>
              <p className="text-[10px] tracking-widest text-coffee-400 mt-2">BREWING ARTISANAL MAGIC...</p>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen selection:bg-coffee-500 selection:text-white transition-opacity duration-700 ease-out opacity-100">
          <Navbar />
          <main>
            <Hero />
            <About />
            <Menu />
            <Gallery />
            <Testimonials />
            <Contact />
          </main>
          <Footer />
        </div>
      );
    };

    // Render React App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
      <ThemeProvider>
        <App />
      </ThemeProvider>
    );
  </script>
</body>
